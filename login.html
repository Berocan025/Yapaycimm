    <!-- diziportal Login CSS Styles -->
    <style>
        /* DiziPortal.Com - Box Sports Login Styles - Developer: DiziPortal.Com Team */
        .diziportal-login-reset {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .diziportal-login-body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 25%, #16213e 50%, #0e1628 75%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* DiziPortal.Com Animated Background */
        .diziportal-login-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
            animation: diziportalFloatBg 20s ease-in-out infinite;
        }

        @keyframes diziportalFloatBg {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .diziportal-login-container {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 20px;
            padding: 3rem;
            border: 2px solid rgba(255, 107, 107, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        0 0 40px rgba(255, 107, 107, 0.1);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            animation: diziportalLoginSlideIn 0.8s ease-out;
        }

        @keyframes diziportalLoginSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .diziportal-login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .diziportal-login-logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #ffa500, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: diziportalGradientShift 3s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes diziportalGradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .diziportal-login-title {
            font-size: 1.2rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .diziportal-login-subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        .diziportal-login-form {
            margin-bottom: 2rem;
        }

        .diziportal-login-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .diziportal-login-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ffffff;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .diziportal-login-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255, 107, 107, 0.3);
            border-radius: 12px;
            background: rgba(15, 15, 35, 0.8);
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .diziportal-login-input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
            transform: translateY(-1px);
        }

        .diziportal-login-input::placeholder {
            color: #666;
        }

        .diziportal-login-btn {
            width: 100%;
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            color: #000;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .diziportal-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .diziportal-login-btn:active {
            transform: translateY(0);
        }

        .diziportal-login-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            animation: diziportalShake 0.5s ease-in-out;
        }

        @keyframes diziportalShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .diziportal-login-success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #00ff88;
            padding: 1rem;
            border-radius: 8px;

            text-align: center;

            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 107, 107, 0.2);

            color: #ff6b6b;

            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .diziportal-back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 255, 136, 0.5);
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .diziportal-login-container {

            }
            
            .diziportal-back-btn {
                top: 10px;
                left: 10px;
                padding: 0.6rem;
            }
        }

        /* Loading Animation */
        .diziportal-loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: diziportalSpin 1s linear infinite;
            margin-left: 10px;
            display: inline-block;
        }

        @keyframes diziportalSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

<body class="diziportal-login-reset diziportal-login-body">

        <div class="diziportal-login-header">
            <div class="diziportal-login-logo">🔐 Admin Giriş</div>
            <div class="diziportal-login-title">Box Sports Yönetim Paneli</div>
            <div class="diziportal-login-subtitle">DiziPortal.Com Güvenli Erişim</div>
        </div>

        <div id="diziportalLoginMessage"></div>

        <form id="diziportalLoginForm" class="diziportal-login-form">
            <div class="diziportal-login-group">
                <label for="username" class="diziportal-login-label">👤 Kullanıcı Adı</label>
                <input 
                    type="text" 
                    id="username" 
                    class="diziportal-login-input" 
                    placeholder="Kullanıcı adınızı girin"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="diziportal-login-group">
                <label for="password" class="diziportal-login-label">🔑 Şifre</label>
                <input 
                    type="password" 
                    id="password" 
                    class="diziportal-login-input" 
                    placeholder="Şifrenizi girin"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="diziportal-login-btn" id="diziportalLoginBtn">
                🚀 Giriş Yap
                <span class="diziportal-loading" id="diziportalLoginLoading" style="display: none;"></span>
            </button>
        </form>

        <div class="diziportal-login-footer">

    <!-- diziportal Login JavaScript -->
    <script>
        // DiziPortal.Com - Secure Admin Login System
        // Developer: DiziPortal.Com Development Team
        
        class DiziPortalLoginManager {
            constructor() {
                this.maxAttempts = 5;
                this.lockoutTime = 5 * 60 * 1000; // 5 minutes
                this.init();
            }

            init() {
                console.log('🔐 DiziPortal.Com Login System initializing...');
                this.diziportalSetupEventListeners();
                this.diziportalCheckLockout();
                this.diziportalCheckDefaultCredentials();
            }

            diziportalSetupEventListeners() {
                const loginForm = document.getElementById('diziportalLoginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.diziportalHandleLogin();
                    });
                }

                // Enter key support
                document.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.diziportalHandleLogin();
                    }
                });
            }

            diziportalCheckDefaultCredentials() {
                // Set default admin credentials if not set
                const savedCredentials = localStorage.getItem('diziportalAdminCredentials');
                if (!savedCredentials) {
                    const defaultCredentials = {
                        username: 'admin',
                        password: 'diziportal2025'
                    };
                    localStorage.setItem('diziportalAdminCredentials', JSON.stringify(defaultCredentials));
                    console.log('🔧 DiziPortal.Com: Default admin credentials set');
                }
            }

            diziportalHandleLogin() {
                if (this.diziportalIsLockedOut()) {
                    this.diziportalShowMessage('Çok fazla başarısız deneme! Lütfen daha sonra tekrar deneyin.', 'error');
                    return;
                }

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    this.diziportalShowMessage('Lütfen kullanıcı adı ve şifre girin!', 'error');
                    return;
                }

                this.diziportalShowLoading(true);

                // Simulate loading for better UX
                setTimeout(() => {
                    this.diziportalVerifyCredentials(username, password);
                }, 1000);
            }

            diziportalVerifyCredentials(username, password) {
                try {
                    const savedCredentials = localStorage.getItem('diziportalAdminCredentials');
                    const credentials = JSON.parse(savedCredentials);

                    if (credentials.username === username && credentials.password === password) {
                        console.log('✅ DiziPortal.Com: Login successful');
                        this.diziportalLoginSuccess();
                    } else {
                        console.log('❌ DiziPortal.Com: Login failed');
                        this.diziportalLoginFailed();
                    }
                } catch (error) {
                    console.error('❌ DiziPortal.Com: Login error:', error);
                    this.diziportalShowMessage('Sistem hatası oluştu!', 'error');
                } finally {
                    this.diziportalShowLoading(false);
                }
            }

            diziportalLoginSuccess() {
                // Create session token
                const sessionToken = 'diziportal_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const sessionExpiry = Date.now() + (2 * 60 * 60 * 1000); // 2 hours

                const session = {
                    token: sessionToken,
                    expiry: sessionExpiry,
                    timestamp: Date.now()
                };

                localStorage.setItem('diziportalAdminSession', JSON.stringify(session));
                localStorage.removeItem('diziportalLoginAttempts');

                this.diziportalShowMessage('Giriş başarılı! Yönlendiriliyor...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1500);
            }

            diziportalLoginFailed() {
                let attempts = parseInt(localStorage.getItem('diziportalLoginAttempts') || '0');
                attempts++;
                localStorage.setItem('diziportalLoginAttempts', attempts.toString());

                const remainingAttempts = this.maxAttempts - attempts;

                if (attempts >= this.maxAttempts) {
                    const lockoutTime = Date.now() + this.lockoutTime;
                    localStorage.setItem('diziportalLockoutTime', lockoutTime.toString());
                    this.diziportalShowMessage('Çok fazla başarısız deneme! 5 dakika bekleyin.', 'error');
                } else {
                    this.diziportalShowMessage(`Hatalı kullanıcı adı veya şifre! ${remainingAttempts} deneme hakkınız kaldı.`, 'error');
                }

                // Clear password field
                document.getElementById('password').value = '';
            }

            diziportalIsLockedOut() {
                const lockoutTime = parseInt(localStorage.getItem('diziportalLockoutTime') || '0');
                if (lockoutTime > Date.now()) {
                    return true;
                }
                if (lockoutTime > 0 && lockoutTime <= Date.now()) {
                    localStorage.removeItem('diziportalLockoutTime');
                    localStorage.removeItem('diziportalLoginAttempts');
                }
                return false;
            }

            diziportalCheckLockout() {
                if (this.diziportalIsLockedOut()) {
                    const lockoutTime = parseInt(localStorage.getItem('diziportalLockoutTime'));
                    const remainingTime = Math.ceil((lockoutTime - Date.now()) / 1000 / 60);
                    this.diziportalShowMessage(`Hesap kilitli! ${remainingTime} dakika sonra tekrar deneyin.`, 'error');
                }
            }

            diziportalShowMessage(message, type = 'error') {
                const messageContainer = document.getElementById('diziportalLoginMessage');
                if (!messageContainer) return;

                const messageClass = type === 'success' ? 'diziportal-login-success' : 'diziportal-login-error';
                messageContainer.innerHTML = `<div class="${messageClass}">${message}</div>`;

                setTimeout(() => {
                    if (type !== 'success') {
                        messageContainer.innerHTML = '';
                    }
                }, 5000);
            }

            diziportalShowLoading(show) {
                const loginBtn = document.getElementById('diziportalLoginBtn');
                const loading = document.getElementById('diziportalLoginLoading');
                
                if (show) {
                    loginBtn.disabled = true;
                    loginBtn.style.opacity = '0.7';
                    loading.style.display = 'inline-block';
                } else {
                    loginBtn.disabled = false;
                    loginBtn.style.opacity = '1';
                    loading.style.display = 'none';
                }
            }
        }

        // Initialize DiziPortal.Com Login Manager
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🎯 DiziPortal.Com: Login page loaded');
            new DiziPortalLoginManager();
            new DiziPortalLoginProtection();
        });

        // DiziPortal.Com Anti-DevTools Protection for Login
        class DiziPortalLoginProtection {
            constructor() {
                this.init();
            }

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'F12' ||

                        window.location.href = 'about:blank';
                        return false;
                    }
                });

                document.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    return false;

    </script>
